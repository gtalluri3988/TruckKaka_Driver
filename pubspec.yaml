name: truck_kaka_driver
description: TruckKaka Driver App — dedicated app for drivers in the ASVA Logistics platform.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management / DI / Routing
  get: ^4.7.3

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0
  connectivity_plus: ^7.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.4

  # Auth & JWT
  jwt_decoder: ^2.0.1
  smart_auth: ^3.2.0

  # Storage
  shared_preferences: ^2.5.3

  # UI & Animation
  google_fonts: ^6.2.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  pinput: ^6.0.1
  iconsax: ^0.0.8
  oktoast: ^3.4.0

  # File & Image Handling
  image_picker: ^1.0.7
  file_picker: ^10.3.7

  # Internationalization
  intl: ^0.20.2

  # GPS & Background Location Tracking
  geolocator: ^14.0.0
  flutter_background_service: ^5.0.12
  flutter_background_service_android: ^6.2.7
  sqflite: ^2.4.1

  # Utilities
  url_launcher: ^6.3.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/dashboard/
    - assets/lottie/
